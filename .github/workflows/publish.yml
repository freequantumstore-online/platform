name: Publish SDK
on:
  push:
    branches: [main]
    paths:
      - 'packages/sdk/**'
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter ./packages/sdk build
      - name: Check if version changed
        id: check
        run: |
          PKG_NAME=$(node -p "require('./packages/sdk/package.json').name")
          PKG_VER=$(node -p "require('./packages/sdk/package.json').version")
          NPM_VER=$(npm view "$PKG_NAME" version 2>/dev/null || echo "0.0.0")
          if [ "$PKG_VER" != "$NPM_VER" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      - name: Publish
        if: steps.check.outputs.changed == 'true'
        run: pnpm --filter ./packages/sdk publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
