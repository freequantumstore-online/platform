name: Deploy Store to R2
on:
  push:
    branches: [main]
    paths:
      - 'store/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-store
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build index page
        run: node store/build-index.js

      - name: Build detail pages
        run: node store/build-details.js

      - name: Upload store to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          aws s3 sync store/ s3://fqs-circuits/store/ \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            --exclude '.gitignore' \
            --exclude 'partials/*' \
            --exclude 'templates/*' \
            --exclude 'build-index.js' \
            --exclude 'build-details.js' \
            --exclude 'dist/*' \
            --exclude 'console/*' \
            --delete

      - name: Upload console to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          aws s3 sync store/console/ s3://fqs-circuits/console/ \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            --delete
