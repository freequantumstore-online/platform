name: Publish to npm
on:
  push:
    branches: [main]
    paths:
      - 'packages/cli/**'
      - 'packages/sdk/**'
      - 'packages/compliance/**'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build

      - name: Publish packages
        run: |
          for pkg in compliance sdk cli; do
            cd packages/$pkg
            LOCAL=$(node -p "require('./package.json').version")
            NAME=$(node -p "require('./package.json').name")
            NPM=$(npm view "$NAME" version 2>/dev/null || echo "0.0.0")

            if [ "$LOCAL" != "$NPM" ]; then
              echo "Publishing $NAME@$LOCAL (npm has $NPM)"
              npm publish --provenance --access public || true
            else
              # Auto-bump patch if there are changes
              CHANGED=$(git diff --name-only HEAD~1 -- . 2>/dev/null | wc -l)
              if [ "$CHANGED" -gt 0 ]; then
                npm version patch --no-git-tag-version
                NEW=$(node -p "require('./package.json').version")
                echo "Auto-bumped $NAME to $NEW"
                npm publish --provenance --access public || true
              else
                echo "No changes in $NAME, skipping"
              fi
            fi
            cd ../..
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bumps
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: bump package versions [skip ci]"
          git push || true
