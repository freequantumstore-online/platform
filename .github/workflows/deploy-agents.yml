name: Deploy Agents to R2
on:
  push:
    branches: [main]
    paths:
      - 'agents/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-agents
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Detect changed agents
        id: changed
        run: |
          SLUGS=$(git diff --name-only HEAD~1 -- agents/ \
            | grep '^agents/' \
            | cut -d/ -f2 \
            | sort -u \
            | tr '\n' ' ')
          echo "slugs=$SLUGS" >> "$GITHUB_OUTPUT"
          echo "Changed agents: $SLUGS"

      - name: Build and upload agents
        if: steps.changed.outputs.slugs != ''
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          for SLUG in ${{ steps.changed.outputs.slugs }}; do
            echo "--- Building $SLUG ---"
            if [ ! -d "agents/$SLUG/web" ]; then
              echo "No web/ directory for $SLUG, skipping"
              continue
            fi

            cd agents/$SLUG/web
            npm install
            npm run build
            cd ../../..

            echo "--- Uploading $SLUG to R2 ---"
            aws s3 sync agents/$SLUG/web/dist/ s3://fqs-circuits/agents/$SLUG/ \
              --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com \
              --delete

            echo "--- Upserting D1 route for $SLUG ---"
            npx wrangler d1 execute fqs --remote --command \
              "INSERT OR IGNORE INTO routes (slug, zone, r2_prefix, store, hosted_on, created_at, updated_at) VALUES ('$SLUG', 'freequantumstore.online', 'agents/$SLUG', 'agents', 'r2', strftime('%s','now'), strftime('%s','now'))"

            echo "--- Done: $SLUG ---"
          done
